<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="456" height="456" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Colorful circles representing the game colors -->
  <circle cx="150" cy="150" r="40" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="306" cy="150" r="40" fill="#4ECDC4" opacity="0.7"/>
  <circle cx="228" cy="228" r="55" fill="url(#circleGrad)"/>
  <circle cx="150" cy="306" r="40" fill="#95E1D3" opacity="0.7"/>
  <circle cx="306" cy="306" r="40" fill="#FFE66D" opacity="0.7"/>
  
  <!-- Central "CR" icon -->
  <text x="228" y="248" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="white" letter-spacing="-4">CR</text>
  
  <!-- AvilaOps branding -->
  <text x="228" y="390" font-family="Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="white" opacity="0.9">AVILAOPS</text>
</svg>
